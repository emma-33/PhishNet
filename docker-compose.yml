services:
  db:
    image: postgres:15-alpine
    container_name: phishnet-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-phishnet}
      POSTGRES_USER: ${POSTGRES_USER:-phishnet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - phishnet-network

  gophish:
    image: gophish/gophish
    container_name: phishnet-gophish
    restart: unless-stopped
    ports:
      - "${GOPHISH_ADMIN_PORT:-3333}:3333"
      - "${GOPHISH_PHISHING_PORT:-8080}:80"
    volumes:
      - gophish_data:/opt/gophish
    networks:
      - phishnet-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: phishnet-backend
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      FLASK_DEBUG: ${FLASK_DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql://${POSTGRES_USER:-phishnet}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-phishnet}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:80}
    depends_on:
      - db
      - gophish
    networks:
      - phishnet-network
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 10 &&
        if [ ! -d 'migrations' ]; then
          echo 'Initializing migrations...' &&
          flask db init &&
          echo 'Creating initial migration...' &&
          flask db migrate -m 'Initial migration' &&
          echo 'Applying migrations...' &&
          flask db upgrade;
        else
          echo 'Migrations folder exists, running upgrade...' &&
          flask db upgrade || (
            echo 'Migration failed, creating new migration...' &&
            flask db migrate -m 'Auto migration' &&
            flask db upgrade
          );
        fi &&
        echo 'Starting application...' &&
        gunicorn --bind 0.0.0.0:5000 --workers 4 --timeout 120 --access-logfile - --error-logfile - wsgi:app
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: phishnet-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - phishnet-network

networks:
  phishnet-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  gophish_data:
    driver: local
